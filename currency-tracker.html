<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VATSIM Currency Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b10;--bg1:#0d1117;--bg2:#111820;--bg3:#161e2a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e2e8f0;--text2:#8899aa;--text3:#445566;
  --green:#22d3a5;--green-bg:rgba(34,211,165,0.08);--green-bd:rgba(34,211,165,0.22);
  --amber:#f0b429;--amber-bg:rgba(240,180,41,0.08);--amber-bd:rgba(240,180,41,0.22);
  --red:#f05252;--red-bg:rgba(240,82,82,0.08);--red-bd:rgba(240,82,82,0.22);
  --blue:#3b9eff;
  --mono:'JetBrains Mono',monospace;
  --display:'Syne',sans-serif;
  --r:8px;--rs:5px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(34,211,165,0.04) 0%,transparent 60%),
             radial-gradient(ellipse 60% 40% at 80% 110%,rgba(59,158,255,0.03) 0%,transparent 50%);}
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(255,255,255,0.016) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.016) 1px,transparent 1px);
  background-size:40px 40px;}
#root{position:relative;z-index:1;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px}
.header{position:sticky;top:0;z-index:100;background:rgba(8,11,16,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:22px;height:22px;border-radius:6px;background:rgba(34,211,165,0.1);border:1px solid rgba(34,211,165,0.3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 6px var(--green)}50%{box-shadow:0 0 14px var(--green),0 0 20px rgba(34,211,165,0.3)}}
.logo-text{font-family:var(--display);font-size:14px;font-weight:800;letter-spacing:.02em}
.logo-sub{font-size:9px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-top:1px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.main{max-width:960px;margin:0 auto;padding:16px 20px}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 60px);padding:40px 20px;text-align:center}
.welcome-logo{font-family:var(--display);font-size:36px;font-weight:800;letter-spacing:.01em;margin-bottom:6px}
.welcome-sub{font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:48px}
.welcome-card{background:var(--bg1);border:1px solid var(--border2);border-radius:12px;padding:32px 36px;max-width:440px;width:100%}
.welcome-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.welcome-input-row{display:flex;gap:8px}
.welcome-input{flex:1;font-family:var(--mono);font-size:14px;background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);padding:9px 12px;outline:none;transition:border-color .15s}
.welcome-input:focus{border-color:rgba(34,211,165,0.5)}
.welcome-btn{font-family:var(--mono);font-size:12px;font-weight:600;background:var(--green);color:#080b10;border:none;border-radius:var(--rs);padding:9px 18px;cursor:pointer;white-space:nowrap;transition:opacity .15s,transform .1s;letter-spacing:.03em}
.welcome-btn:hover:not(:disabled){opacity:.85;transform:translateY(-1px)}
.welcome-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.welcome-note{font-size:10px;color:var(--text3);margin-top:12px;line-height:1.6}
.welcome-error{font-size:11px;color:var(--red);margin-top:10px;padding:7px 10px;background:var(--red-bg);border:1px solid var(--red-bd);border-radius:5px}
.welcome-features{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:32px;max-width:440px;width:100%}
.welcome-feat{background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:left}
.welcome-feat-title{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px}
.welcome-feat-desc{font-size:10px;color:var(--text3);line-height:1.5}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px}
.tab-btn{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;padding:8px 16px;margin-bottom:-1px;cursor:pointer;transition:color .15s,border-color .15s;letter-spacing:.04em;text-transform:uppercase}
.tab-btn.active{color:var(--text);border-bottom-color:var(--green)}
.tab-btn:hover:not(.active){color:var(--text2)}
.btn{font-family:var(--mono);font-size:11px;cursor:pointer;background:rgba(255,255,255,0.05);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text2);padding:5px 10px;transition:background .15s,color .15s}
.btn:hover:not(:disabled){background:rgba(255,255,255,0.09);color:var(--text)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.active{background:rgba(34,211,165,0.1);border-color:rgba(34,211,165,0.3);color:var(--green)}
input[type=text],input[type=number]{font-family:var(--mono);font-size:11px;background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);padding:5px 9px;outline:none;transition:border-color .15s}
input:focus{border-color:rgba(34,211,165,0.4)}
input[type=number]{width:72px}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:5px}
.card.status-current{border-color:var(--green-bd);background:var(--green-bg)}
.card.status-warning{border-color:var(--amber-bd);background:var(--amber-bg)}
.card.status-lapsed{border-color:var(--red-bd);background:var(--red-bg)}
.card.ignored{opacity:.35;border-color:var(--border)!important;background:var(--bg1)!important}
.card-row{padding:9px 13px;cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none;min-width:0}
.card-row:hover{background:rgba(255,255,255,0.02)}
.card-body{padding:0 13px 12px;border-top:1px solid var(--border)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
.dot.current{background:var(--green);box-shadow:0 0 6px var(--green)}
.dot.warning{background:var(--amber);box-shadow:0 0 6px var(--amber)}
.dot.lapsed{background:var(--red);box-shadow:0 0 6px var(--red)}
.dot.lg{width:10px;height:10px}
.badge{font-size:9px;font-weight:700;letter-spacing:.06em;border-radius:3px;padding:2px 5px;flex-shrink:0}
.badge-DEL{color:#818cf8;background:rgba(129,140,248,0.1);border:1px solid rgba(129,140,248,0.2)}
.badge-GND{color:#a78bfa;background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.2)}
.badge-TWR{color:#22d3ee;background:rgba(34,211,238,0.1);border:1px solid rgba(34,211,238,0.2)}
.badge-APP{color:#60a5fa;background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.2)}
.badge-CTR{color:#fbbf24;background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.2)}
.pill{font-size:10px;font-weight:500;white-space:nowrap;flex-shrink:0;border-radius:4px;padding:1px 7px}
.pill.current{color:var(--green);background:rgba(34,211,165,0.08);border:1px solid rgba(34,211,165,0.2)}
.pill.warning{color:var(--amber);background:rgba(240,180,41,0.1);border:1px solid rgba(240,180,41,0.25)}
.pill.lapsed{color:var(--red);background:rgba(240,82,82,0.08);border:1px solid rgba(240,82,82,0.2)}
.pill.never{color:var(--text3);border:1px solid var(--border)}
.bar-track{height:3px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;flex-shrink:0}
.bar-fill{height:100%;border-radius:2px;transition:width .3s}
.bar-fill.current{background:var(--green)}.bar-fill.warning{background:var(--amber)}.bar-fill.lapsed{background:var(--red)}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:10px 0 8px}
.stat-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:6px;padding:8px 10px}
.stat-label{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.stat-val{font-size:12px;font-weight:600;color:var(--text)}.stat-sub{font-size:9px;color:var(--text3);margin-top:2px}
.stat-box.hi-warn .stat-val{color:var(--amber)}.stat-box.hi-red .stat-val{color:var(--red)}
.policy-banner{border-radius:var(--r);padding:12px 15px;margin-bottom:12px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.policy-banner.current{background:var(--green-bg);border:1px solid var(--green-bd)}
.policy-banner.warning{background:var(--amber-bg);border:1px solid var(--amber-bd)}
.policy-banner.lapsed{background:var(--red-bg);border:1px solid var(--red-bd)}
.section-label{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:5px}
.session-row{display:flex;align-items:center;gap:7px;font-size:10px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.session-row:last-child{border-bottom:none}
.session-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.session-dot.in{background:rgba(34,211,165,0.3);border:1px solid rgba(34,211,165,0.5)}
.session-dot.out{background:rgba(255,255,255,0.06);border:1px solid var(--border2)}
.rules-panel{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;margin-bottom:10px}
.rules-toggle{display:flex;align-items:center;gap:7px;font-size:10px;color:var(--text3);cursor:pointer;background:none;border:none;font-family:var(--mono);width:100%;text-align:left}
.rules-toggle:hover{color:var(--text2)}
.rules-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.rules-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.status-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.chip{display:flex;align-items:center;gap:5px;border-radius:5px;padding:3px 8px;font-size:10px}
.chip.current{background:var(--green-bg);border:1px solid var(--green-bd);color:var(--green)}
.chip.warning{background:var(--amber-bg);border:1px solid var(--amber-bd);color:var(--amber)}
.chip.lapsed{background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red)}
.chip.muted{background:rgba(255,255,255,0.02);border:1px solid var(--border);color:var(--text3)}
.filter-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.sort-bar{display:flex;gap:5px;align-items:center;margin-bottom:10px}
.sort-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.alltime-row{display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--text3);background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:4px;padding:5px 8px;margin-bottom:8px}
.alltime-row span:last-child{color:var(--text2);font-weight:600;font-size:11px}
.family-swatch{width:3px;height:14px;border-radius:2px;flex-shrink:0}
.type-card{background:rgba(255,255,255,0.025);border:1px solid var(--border);border-radius:5px;padding:7px 9px;margin-bottom:4px}
.type-card:last-child{margin-bottom:0}
.type-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.type-sessions{display:flex;gap:4px;flex-wrap:wrap}
.type-sess-pill{font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(255,255,255,0.03)}
.type-sess-pill.in{color:var(--green)}.type-sess-pill.out{color:var(--text3)}
.info-bar{font-size:10px;color:var(--text3);background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--rs);padding:5px 9px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.info-bar.syncing{color:var(--amber);border-color:var(--amber-bd)}
.info-bar.synced{color:var(--green);border-color:var(--green-bd)}
.info-bar.error{color:var(--red);border-color:var(--red-bd)}
.info-bar.live{color:var(--green);border-color:var(--green-bd);background:var(--green-bg)}
.loading-overlay{position:fixed;inset:0;background:rgba(8,11,16,0.95);backdrop-filter:blur(8px);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-msg{font-size:11px;color:var(--text3);letter-spacing:.05em}
.load-title{font-family:var(--display);font-size:11px;color:var(--text3);letter-spacing:.1em;margin-top:4px}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .18s ease forwards}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.flex-1{flex:1}.mt-1{margin-top:5px}.mb-1{margin-bottom:5px}.mb-2{margin-bottom:10px}
@media(max-width:600px){
  .main{padding:10px 12px}.header{padding:8px 12px}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .rules-grid{grid-template-columns:1fr 1fr}
  .welcome-features{grid-template-columns:1fr}
  .welcome-card{padding:24px 20px}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useCallback, useEffect, useMemo } = React;
const DEFAULT_ATC = { reqH:3, rollD:90, warnD:14 };
const DEFAULT_FLY = { reqH:15, rollD:30, warnD:14 };

// ── IndexedDB ────────────────────────────────────────────────
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open("vatsim_currency", 2);
    req.onupgradeneeded = ev => {
      const db = ev.target.result;
      ["atc_sessions","fly_sessions","settings"].forEach(n => {
        if (!db.objectStoreNames.contains(n))
          db.createObjectStore(n, { keyPath: n==="settings"?"key":"id" });
      });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}
const dbGetAll = async store => {
  const db = await openDB();
  return new Promise((res,rej) => { const req=db.transaction(store,"readonly").objectStore(store).getAll(); req.onsuccess=()=>res(req.result); req.onerror=()=>rej(req.error); });
};
const dbPutMany = async (store, items) => {
  if (!items.length) return;
  const db = await openDB();
  return new Promise((res,rej) => { const tx=db.transaction(store,"readwrite"),os=tx.objectStore(store); items.forEach(i=>os.put(i)); tx.oncomplete=res; tx.onerror=()=>rej(tx.error); });
};
const dbGet = async (store, key) => {
  const db = await openDB();
  return new Promise((res,rej) => { const req=db.transaction(store,"readonly").objectStore(store).get(key); req.onsuccess=()=>res(req.result?.value??null); req.onerror=()=>rej(req.error); });
};
const dbSet = async (store, key, value) => {
  const db = await openDB();
  return new Promise((res,rej) => { const tx=db.transaction(store,"readwrite"); tx.objectStore(store).put({key,value}); tx.oncomplete=res; tx.onerror=()=>rej(tx.error); });
};
const dbClear = async store => {
  const db = await openDB();
  return new Promise((res,rej) => { const tx=db.transaction(store,"readwrite"); tx.objectStore(store).clear(); tx.oncomplete=res; tx.onerror=()=>rej(tx.error); });
};

// ── VATSIM API ───────────────────────────────────────────────
const apiAtc    = async (cid,limit=1000,offset=0) => { const r=await fetch(`https://api.vatsim.net/v2/members/${cid}/atc?limit=${limit}&offset=${offset}`); if(!r.ok)throw new Error(`ATC API ${r.status}`); const d=await r.json(); return {items:d.items||[],count:d.count||0}; };
const apiPilot  = async (cid,limit=500) => { const r=await fetch(`https://api.vatsim.net/v2/members/${cid}/history?limit=${limit}`); if(!r.ok)throw new Error(`Pilot API ${r.status}`); const d=await r.json(); return d.items||[]; };
const apiFP     = async cid => { const r=await fetch(`https://api.vatsim.net/v2/members/${cid}/flightplans`); if(!r.ok)throw new Error(`FP API ${r.status}`); return r.json(); };
const apiMember = async cid => { const r=await fetch(`https://api.vatsim.net/v2/members/${cid}`); if(!r.ok)throw new Error(`Member ${r.status}`); return r.json(); };

// ── Aircraft families ────────────────────────────────────────
const FAMILIES = {
  "Airbus A220 family": {pat:/^(A21[89]|BCS)/,           color:"#38bdf8"},
  "Airbus A320 family": {pat:/^(A31[89]|A32[01234])/,    color:"#3b9eff"},
  "Airbus A330 family": {pat:/^(A33[02346])/,             color:"#6366f1"},
  "Airbus A350 family": {pat:/^(A35[0-9K])/,             color:"#06b6d4"},
  "Airbus A380":        {pat:/^(A38)/,                   color:"#0ea5e9"},
  "Boeing 737 family":  {pat:/^(B73[0-9]|B737)/,         color:"#f59e0b"},
  "Boeing 747 family":  {pat:/^(B74[0-9])/,              color:"#f97316"},
  "Boeing 767 family":  {pat:/^(B76[0-9])/,              color:"#84cc16"},
  "Boeing 777 family":  {pat:/^(B77[0-9LW])/,            color:"#22c55e"},
  "Boeing 787 family":  {pat:/^(B78[0-9])/,              color:"#10b981"},
  "McDonnell Douglas":  {pat:/^(MD[0-9]|DC[0-9])/,       color:"#ef4444"},
  "Cessna Citation":    {pat:/^(C5[56789]|C65|C68|C70|C75)/,color:"#ec4899"},
  "TBM":                {pat:/^(TBM)/,                   color:"#a855f7"},
  "Cessna / Piper GA":  {pat:/^(C1[0-9][0-9]|C2[0-9][0-9]|PA[0-9]|SR[0-9])/,color:"#14b8a6"},
  "Helicopter":         {pat:/^(H[0-9]|EC[0-9]|AS[0-9]|AW[0-9]|R[0-9][0-9])/,color:"#f43f5e"},
  "Turboprop":          {pat:/^(F40[0-9]|ATR|DH8|E17[0-9])/,color:"#78716c"},
  "Military / Heavy":   {pat:/^(C17|C130|C5|KC)/,        color:"#6b7280"},
  "Other":              {pat:/./,                        color:"#6b7280"},
};
function classifyAc(code) {
  if (!code) return null;
  const c = code.toUpperCase().replace(/\/.*$/,"").trim();
  for (const [n,{pat}] of Object.entries(FAMILIES)) if (pat.test(c)) return n;
  return "Other";
}

// ── Data helpers ─────────────────────────────────────────────
function normCS(cs) {
  if (!cs) return null;
  cs = cs.toUpperCase().trim();
  if (["_OBS","_ATIS","_FSS","_SUP"].some(s=>cs.endsWith(s))) return null;
  if (cs.endsWith("_CTR")) return cs;
  return cs.replace(/_\d+_/,"_").replace(/_\d+$/,"");
}
function posType(k) {
  if (!k) return null;
  if (k.endsWith("_DEL")) return "DEL"; if (k.endsWith("_GND")) return "GND";
  if (k.endsWith("_TWR")) return "TWR"; if (k.endsWith("_APP")) return "APP";
  if (k.endsWith("_CTR")) return "CTR"; return "OTHER";
}
function posLabel(k) {
  const p=k.split("_"),t=p[p.length-1];
  if (t==="CTR"&&p.length>2) return p.slice(0,-1).join(" ")+" CTR";
  return `${p[0]} ${t}`;
}
const TORD = {DEL:0,GND:1,TWR:2,APP:3,CTR:4,OTHER:5};

function parseAtcItems(items) {
  return items.map(item => {
    const c = item.connection_id || item;
    return { id:String(c.id||`${c.callsign}_${c.start}`), callsign:c.callsign, start:c.start, end:c.end, dm:(new Date(c.end)-new Date(c.start))/60000 };
  }).filter(s=>s.callsign&&s.start&&s.end&&s.dm>=1);
}
function buildPositions(sessions) {
  const map={};
  for (const s of sessions) {
    const key=normCS(s.callsign); if(!key) continue;
    const type=posType(key); if(!type||type==="OTHER") continue;
    if (!map[key]) map[key]=[];
    map[key].push(s);
  }
  return map;
}
function buildFamilies(sessions) {
  const map={};
  for (const s of sessions) {
    if (!s.family) continue;
    if (!map[s.family]) map[s.family]={family:s.family,sessions:[],types:{}};
    map[s.family].sessions.push(s);
    if (!map[s.family].types[s.ac]) map[s.family].types[s.ac]=[];
    map[s.family].types[s.ac].push(s);
  }
  return Object.values(map).sort((a,b)=>b.sessions.reduce((x,s)=>x+s.dm,0)-a.sessions.reduce((x,s)=>x+s.dm,0));
}

// ── Currency maths ───────────────────────────────────────────
function getQtr(d=new Date()) {
  const y=d.getFullYear(),m=d.getMonth(),q=Math.floor(m/3);
  const s=[new Date(y,0,1),new Date(y,3,1),new Date(y,6,1),new Date(y,9,1)];
  const e=[new Date(y,3,1),new Date(y,6,1),new Date(y,9,1),new Date(y+1,0,1)];
  return {start:s[q],end:e[q]};
}
const daysUntil = d => Math.ceil((d-new Date())/86400000);
const daysAgo   = d => Math.floor((new Date()-d)/86400000);
function fmtDate(d,short=false) {
  if (!d) return "—";
  return d.toLocaleDateString("en-GB",short?{day:"numeric",month:"short"}:{day:"numeric",month:"short",year:"numeric"});
}
function fmtH(m) { const h=Math.floor(m/60),mm=Math.round(m%60); return mm>0?`${h}h ${mm}m`:`${h}h`; }

function calcRolling(sessions,reqH,rollD,warnD=14,today=new Date()) {
  const ws=new Date(today-rollD*86400000);
  const inW=sessions.filter(s=>new Date(s.end)>=ws);
  const totalMins=inW.reduce((a,s)=>a+s.dm,0),totalHours=totalMins/60;
  const sorted=[...sessions].sort((a,b)=>new Date(a.start)-new Date(b.start));
  const inWS=sorted.filter(s=>new Date(s.end)>=ws);
  const totalAllMins=sessions.reduce((a,s)=>a+s.dm,0);
  const hoursNeeded=Math.max(0,reqH-totalHours);
  let expiry=null,lapseDate=null,status="lapsed";
  if (totalHours>=reqH) {
    let run=0,anc=null;
    for (const s of inWS){run+=s.dm/60;if(run>=reqH){anc=s;break;}}
    if (anc) expiry=new Date(new Date(anc.start).getTime()+rollD*86400000);
    status=daysUntil(expiry||new Date())<=warnD?"warning":"current";
    if (!expiry) status="current";
  } else {
    let lv=null;
    for (const s of sorted) {
      const we=new Date(new Date(s.start).getTime()+rollD*86400000),wst=new Date(s.start);
      const inT=sorted.filter(x=>new Date(x.start)>=wst&&new Date(x.start)<we);
      if (inT.reduce((a,x)=>a+x.dm/60,0)>=reqH) {
        let r2=0,a2=null;
        for (const x of inT){r2+=x.dm/60;if(r2>=reqH){a2=x;break;}}
        if (a2){const c=new Date(new Date(a2.start).getTime()+rollD*86400000);if(!lv||c>lv)lv=c;}
      }
    }
    lapseDate=lv;
  }
  const last=sessions.length>0?sessions.reduce((a,b)=>new Date(a.end)>new Date(b.end)?a:b):null;
  return {totalHours,totalMins,totalAllMins,status,expiry,lapseDate,hoursNeeded,last:last?new Date(last.end):null,inWindowCount:inW.length};
}
function calcPolicy(all,rules,today=new Date()) {
  const {start,end}=getQtr(today);
  const inQ=all.filter(s=>{const d=new Date(s.start);return d>=start&&d<end;});
  const totalMins=inQ.reduce((a,s)=>a+s.dm,0),totalHours=totalMins/60;
  const dlq=daysUntil(end),met=totalHours>=rules.reqH;
  const status=met?(dlq<=rules.warnD?"warning":"current"):(dlq<=rules.warnD?"warning":"lapsed");
  return {totalHours,totalMins,status,quarterStart:start,quarterEnd:end,daysLeft:dlq,hoursNeeded:Math.max(0,rules.reqH-totalHours)};
}

const Dot  = ({s,lg}) => <span className={`dot ${s}${lg?" lg":""}`}/>;

  <div className="bar-track" style={{width,height}}>
    <div className={`bar-fill ${status}`} style={{width:`${Math.min(100,(val/max)*100)}%`}}/>
  </div>
);
function ExpiryPill({r}) {
  if (r.status==="lapsed") {
    if (r.lapseDate) return <span className="pill lapsed">lapsed {fmtDate(r.lapseDate,true)}</span>;
    return <span className="pill never">never current</span>;
  }
  if (!r.expiry) return null;
  const dl=daysUntil(r.expiry);
  if (dl<=0) return <span className="pill warning">expires today</span>;
  if (dl===1) return <span className="pill warning">expires tomorrow</span>;
  return <span className={`pill ${r.status}`}>{fmtDate(r.expiry,true)} · {dl}d</span>;
}
function StatBox({label,val,sub,hiClass}) {
  return <div className={`stat-box ${hiClass||""}`}><div className="stat-label">{label}</div><div className="stat-val">{val}</div>{sub&&<div className="stat-sub">{sub}</div>}</div>;

// ── Welcome screen ───────────────────────────────────────────
function WelcomeScreen({onLoad}) {
  const [cid,setCid]=useState("");
  const [loading,setLoading]=useState(false);
  const [phase,setPhase]=useState("");
  const [error,setError]=useState(null);

  const go = async () => {
    const c=parseInt(cid.trim());
    if (!c||c<800000){setError("Please enter a valid VATSIM CID (7–8 digits)");return;}
    setLoading(true);setError(null);
    try {
      setPhase("Verifying CID…");
      let memberName=`CID ${c}`;
      try {
        const m=await apiMember(c);
        memberName=m?.name_full||m?.name||m?.personal?.name_full||memberName;
      } catch {}

      setPhase("Fetching ATC sessions…");
      const {items:atcRaw}=await apiAtc(c,1000);
      const atcSessions=parseAtcItems(atcRaw);

      setPhase("Fetching pilot sessions…");
      const pilotRaw=await apiPilot(c,500);

      setPhase("Fetching flight plans…");
      let fpMap={};
      try { const fps=await apiFP(c); for (const fp of fps) if(fp.connection_id)fpMap[fp.connection_id]=fp; } catch {}

      const flySessions=pilotRaw
        .filter(s=>s.start&&s.end)
        .map(s=>{
          const dm=(new Date(s.end)-new Date(s.start))/60000;
          const fp=fpMap[s.id];
          const ac=fp?.aircraft?fp.aircraft.split("/")[0]:null;
          return {id:s.id,callsign:s.callsign,start:s.start,end:s.end,dm,ac,family:classifyAc(ac),
                  dep:fp?.dep||"",arr:fp?.arr||"",route:fp?.route||"",altitude:fp?.altitude||"",filed:fp?.filed||""};
        })
        .filter(s=>s.dm>=5&&s.ac);

      setPhase("Saving to local database…");
      await dbClear("atc_sessions"); await dbClear("fly_sessions");
      await dbPutMany("atc_sessions",atcSessions);
      await dbPutMany("fly_sessions",flySessions);
      await dbSet("settings","cid",c);
      await dbSet("settings","member_name",memberName);
      await dbSet("settings","last_sync",new Date().toISOString());

      onLoad({cid:c,memberName,atcSessions,flySessions});
    } catch(e) {
      setError(`Could not load data: ${e.message}`);
    } finally { setLoading(false);setPhase(""); }
  };

  return (
    <div className="welcome">
      <div className="welcome-logo">Currency Tracker</div>
      <div className="welcome-sub">VATSIM · ATC &amp; Pilot Currency</div>
      <div className="welcome-card">
        <div className="welcome-label">Enter your VATSIM CID to get started</div>
        <div className="welcome-input-row">
          <input className="welcome-input" type="text" placeholder="e.g. 1234567"
            value={cid} onChange={ev=>setCid(ev.target.value)}
            onKeyDown={ev=>ev.key==="Enter"&&go()} disabled={loading}/>
          <button className="welcome-btn" onClick={go} disabled={loading||!cid.trim()}>
            {loading?phase||"Loading…":"Load data"}
          </button>
        </div>
        {error&&<div className="welcome-error">{error}</div>}
        <div className="welcome-note">
          Your data is fetched from the VATSIM API and stored locally in this browser.
          Nothing is sent anywhere else.
        </div>
      </div>
      <div className="welcome-features">
        {[
          ["ATC Currency","Rolling-window and fixed-quarter roster requirements per position"],
          ["Flying Currency","Pilot sessions grouped by aircraft family with configurable thresholds"],
          ["Expiry at a glance","Every card shows exactly when currency expires or lapsed"],
          ["Check any controller","Enter any CID in the header to view their ATC currency"],
        ].map(([t,d])=>(
          <div key={t} className="welcome-feat">
            <div className="welcome-feat-title">{t}</div>
            <div className="welcome-feat-desc">{d}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────
function App() {
  const [appState,setAppState]=useState("init");
  const [loadMsg,setLoadMsg]=useState("Checking for saved data…");
  const [cid,setCid]=useState(null);
  const [memberName,setMemberName]=useState(null);
  const [atcSessions,setAtcSessions]=useState([]);
  const [flySessions,setFlySessions]=useState([]);
  const [tab,setTab]=useState("atc");
  const [atcRules,setAtcRules]=useState(DEFAULT_ATC);
  const [flyRules,setFlyRules]=useState(DEFAULT_FLY);
  const [ignored,setIgnored]=useState([]);
  const [atcFilter,setAtcFilter]=useState("all");
  const [atcSort,setAtcSort]=useState("expiry");
  const [liveCid,setLiveCid]=useState(null);
  const [liveAtc,setLiveAtc]=useState(null);
  const [syncMsg,setSyncMsg]=useState(null);

  // Startup: check for saved data
  useEffect(()=>{
    (async()=>{
      try {
        await openDB();
        const [savedCid,savedName,savedAtcR,savedFlyR,savedIgn]=await Promise.all([
          dbGet("settings","cid"), dbGet("settings","member_name"),
          dbGet("settings","atc_rules"), dbGet("settings","fly_rules"),
          dbGet("settings","ignored"),
        ]);
        if (savedAtcR) setAtcRules(savedAtcR);
        if (savedFlyR) setFlyRules(savedFlyR);
        if (savedIgn)  setIgnored(savedIgn);
        if (savedCid) {
          setLoadMsg("Loading your saved data…");
          const [atc,fly]=await Promise.all([dbGetAll("atc_sessions"),dbGetAll("fly_sessions")]);
          if (atc.length>0) {
            setCid(savedCid); setMemberName(savedName||`CID ${savedCid}`);
            setAtcSessions(atc); setFlySessions(fly.filter(s=>s.dm>=5&&s.ac));
            setAppState("ready");
            backgroundSync(savedCid,atc,fly.filter(s=>s.dm>=5&&s.ac));
            return;
          }
        }
        setAppState("welcome");
      } catch { setAppState("welcome"); }
    })();
  },[]);

  async function backgroundSync(cidToSync,existAtc,existFly) {
    setSyncMsg({status:"syncing",text:"Syncing with VATSIM API…"});
    try {
      const {items:atcRaw}=await apiAtc(cidToSync,1000);
      const fresh=parseAtcItems(atcRaw);
      const existIds=new Set(existAtc.map(s=>s.id));
      const newAtc=fresh.filter(s=>!existIds.has(s.id));
      if (newAtc.length>0){await dbPutMany("atc_sessions",newAtc);setAtcSessions(prev=>[...prev,...newAtc]);}
      const pilotRaw=await apiPilot(cidToSync,500);
      const existFlyIds=new Set(existFly.map(s=>s.id));
      const newPilot=pilotRaw.filter(s=>s.start&&s.end&&!existFlyIds.has(s.id));
      if (newPilot.length>0){
        let fpMap={};
        try{const fps=await apiFP(cidToSync);for(const fp of fps)if(fp.connection_id)fpMap[fp.connection_id]=fp;}catch{}
        const enriched=newPilot.map(s=>{
          const dm=(new Date(s.end)-new Date(s.start))/60000;
          const fp=fpMap[s.id];const ac=fp?.aircraft?fp.aircraft.split("/")[0]:null;
          return {id:s.id,callsign:s.callsign,start:s.start,end:s.end,dm,ac,family:classifyAc(ac),
                  dep:fp?.dep||"",arr:fp?.arr||"",route:fp?.route||"",altitude:fp?.altitude||"",filed:fp?.filed||""};
        }).filter(s=>s.dm>=5&&s.ac);
        if (enriched.length>0){await dbPutMany("fly_sessions",enriched);setFlySessions(prev=>[...prev,...enriched]);}
      }
      await dbSet("settings","last_sync",new Date().toISOString());
      setSyncMsg({status:"synced",text:newAtc.length>0?`Synced — ${newAtc.length} new session${newAtc.length>1?"s":""}`:"Up to date"});
      setTimeout(()=>setSyncMsg(null),4000);
    } catch(e){setSyncMsg({status:"error",text:`Sync failed: ${e.message}`});}
  }

  // Persist settings
  useEffect(()=>{if(appState==="ready")dbSet("settings","atc_rules",atcRules);},[atcRules]);
  useEffect(()=>{if(appState==="ready")dbSet("settings","fly_rules",flyRules);},[flyRules]);
  useEffect(()=>{if(appState==="ready")dbSet("settings","ignored",ignored);},[ignored]);

  const handleWelcomeLoad=useCallback(({cid:c,memberName:n,atcSessions:a,flySessions:f})=>{
    setCid(c);setMemberName(n);setAtcSessions(a);setFlySessions(f);setAppState("ready");
  },[]);
  const toggleIgnore=useCallback(key=>setIgnored(prev=>prev.includes(key)?prev.filter(k=>k!==key):[...prev,key]),[]);
  const handleLiveCid=useCallback((c,items)=>{setLiveCid(c);setLiveAtc(items);},[]);
  const clearLive=useCallback(()=>{setLiveCid(null);setLiveAtc(null);},[]);
  const handleReset=useCallback(async()=>{
    if(!confirm("Clear all saved data and start over?"))return;
    await Promise.all([dbClear("atc_sessions"),dbClear("fly_sessions"),dbClear("settings")]);
    setAppState("welcome");setCid(null);setMemberName(null);
    setAtcSessions([]);setFlySessions([]);setIgnored([]);
    setAtcRules(DEFAULT_ATC);setFlyRules(DEFAULT_FLY);
    setLiveCid(null);setLiveAtc(null);
  },[]);

  // Derived
  const activeAtc=liveAtc||atcSessions;
  const posMap=useMemo(()=>buildPositions(activeAtc),[activeAtc]);
  const allAtcFlat=useMemo(()=>Object.values(posMap).flat(),[posMap]);
  const policy=useMemo(()=>calcPolicy(allAtcFlat,atcRules),[allAtcFlat,atcRules]);

  const positions=useMemo(()=>{
    const withR=Object.entries(posMap).map(([key,sess])=>({
      key,label:posLabel(key),type:posType(key),sessions:sess,
      ignored:liveAtc?false:ignored.includes(key),
      r:calcRolling(sess,atcRules.reqH,atcRules.rollD,atcRules.warnD),
    }));
    const filtered=atcFilter==="all"?withR:withR.filter(p=>p.type===atcFilter);
    if (atcSort==="expiry") return filtered.sort((a,b)=>{
      const ord={warning:0,current:1,lapsed:2};
      const ao=ord[a.r.status]??3,bo=ord[b.r.status]??3;
      if(ao!==bo)return ao-bo;
      if(a.r.status==="lapsed")return(b.r.lapseDate?.getTime()??0)-(a.r.lapseDate?.getTime()??0);
      return(a.r.expiry?.getTime()??Infinity)-(b.r.expiry?.getTime()??Infinity);
    });
    if (atcSort==="type") return filtered.sort((a,b)=>TORD[a.type]-TORD[b.type]||a.label.localeCompare(b.label));
    return filtered.sort((a,b)=>a.label.localeCompare(b.label));
  },[posMap,atcFilter,atcSort,atcRules,ignored,liveAtc]);

  const counts=useMemo(()=>{
    const c={current:0,warning:0,lapsed:0};
    positions.filter(p=>!p.ignored).forEach(p=>c[p.r.status]=(c[p.r.status]||0)+1);
    return c;
  },[positions]);

  const familyGroups=useMemo(()=>buildFamilies(flySessions),[flySessions]);

  // ── Render ──────────────────────────────────────────────────
  if (appState==="init") return (
    <div className="loading-overlay">
      <div className="spinner"/>
      <div className="load-msg">{loadMsg}</div>
      <div className="load-title">VATSIM CURRENCY TRACKER</div>
    </div>
  );

  if (appState==="welcome") return (
    <>
      <div className="header">
        <div className="logo">
          <div className="logo-mark"><div className="pulse"/></div>
          <div><div className="logo-text">Currency Tracker</div><div className="logo-sub">VATSIM</div></div>
        </div>
      </div>
      <WelcomeScreen onLoad={handleWelcomeLoad}/>
    </>
  );

  return (
    <div>
      <div className="header">
        <div className="logo">
          <div className="logo-mark"><div className="pulse"/></div>
          <div>
            <div className="logo-text">Currency Tracker</div>
            <div className="logo-sub">{liveAtc?`Viewing CID ${liveCid}`:`${memberName} · CID ${cid}`}</div>
          </div>
        </div>
        <div className="header-right">
          <CidLookup onLoad={handleLiveCid}/>
          {liveAtc&&<button className="btn" onClick={clearLive}>← Own data</button>}
          <button className="btn" style={{fontSize:10,color:"var(--text3)"}} onClick={handleReset} title="Clear saved data">Reset</button>
        </div>
      </div>

      <div className="main">
        <div className="tabs">
          {[["atc","ATC Currency"],["fly","Flying Currency"]].map(([id,label])=>(
            <button key={id} className={`tab-btn${tab===id?" active":""}`} onClick={()=>setTab(id)}>{label}</button>
          ))}
        </div>

        {tab==="atc"&&<>
          <RulesPanel title="ATC currency rules" rules={atcRules} onChange={setAtcRules} accent="var(--green)"/>
          {liveAtc?(
            <div className="info-bar live">
              <span>Live — CID {liveCid} · {allAtcFlat.length} sessions</span>
              <span style={{fontSize:9,color:"var(--text2)"}}>Flying currency still shows your own data</span>
            </div>
          ):syncMsg?(
            <div className={`info-bar ${syncMsg.status}`}><span>{syncMsg.text}</span></div>
          ):null}
          <PolicyBanner pol={policy} rules={atcRules}/>
          <div className="status-chips">
            {["current","warning","lapsed"].map(st=>{
              const c=counts[st]||0;
              return <div key={st} className={`chip ${c>0?st:"muted"}`}>
                <span className={`dot ${st}`}/><strong>{c}</strong>
                <span>{{current:"Current",warning:"Warning",lapsed:"Lapsed"}[st]}</span>
              </div>;
            })}
            <span style={{fontSize:9,color:"var(--text3)",marginLeft:"auto"}}>{positions.filter(p=>!p.ignored).length} positions</span>
          </div>
          <div className="filter-bar">
            {["all","CTR","APP","TWR","GND","DEL"].map(t=>{
              const cols={CTR:"var(--amber)",APP:"var(--blue)",TWR:"var(--green)",GND:"#a78bfa",DEL:"#818cf8"};
              const active=atcFilter===t;
              return <button key={t} className={`btn${active?" active":""}`}
                style={active&&cols[t]?{borderColor:cols[t],color:cols[t],background:`${cols[t]}18`}:{}}
                onClick={()=>setAtcFilter(t)}>{t==="all"?"All":t}</button>;
            })}
          </div>
          <div className="sort-bar">
            <span className="sort-label">Sort</span>
            {[["expiry","Nearest expiry"],["type","Position type"],["alpha","Alphabetical"]].map(([id,lbl])=>(
              <button key={id} className={`btn${atcSort===id?" active":""}`} onClick={()=>setAtcSort(id)}>{lbl}</button>
            ))}
          </div>
          <div>
            {positions.map(pos=><AtcCard key={pos.key} pos={pos} rules={atcRules} onToggle={toggleIgnore}/>)}
            {positions.length===0&&<div style={{fontSize:11,color:"var(--text3)",textAlign:"center",padding:"40px 0"}}>No ATC sessions found.</div>}
          </div>
          {!liveAtc&&ignored.length>0&&<div style={{fontSize:9,color:"var(--text3)",textAlign:"center",marginTop:8}}>{ignored.length} position{ignored.length>1?"s":""} hidden</div>}
        </>}

        {tab==="fly"&&<>
          <RulesPanel title="Flying currency rules" rules={flyRules} onChange={setFlyRules} accent="var(--blue)"/>
          <div className="info-bar">
            <span>{flySessions.length} flights with matched aircraft type · {familyGroups.length} {familyGroups.length===1?"family":"families"}</span>
            <span style={{fontSize:9}}>Stored locally · syncs on load</span>
          </div>
          <div>
            {familyGroups.map(g=><FlyCard key={g.family} group={g} rules={flyRules}/>)}
            {familyGroups.length===0&&<div style={{fontSize:11,color:"var(--text3)",textAlign:"center",padding:"40px 0"}}>
              No pilot sessions with matched aircraft type found.<br/>
              <span style={{fontSize:10,marginTop:6,display:"block"}}>Aircraft type is matched from your last 50 filed flight plans.</span>
            </div>}
          </div>
        </>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
